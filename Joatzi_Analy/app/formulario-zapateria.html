<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>11. Formulario Zapatería</title>
    <style>
        table, td { font-family: verdana; border: 2px solid black; border-collapse: collapse; color: blue; }
        td { padding: 5px; }
        h3 { font-family: courier; color: red; font-size: 150%; }
        body { background-color: powderblue; }
    </style>
</head>
<body>
<center><h3>Registro Venta de Zapatos</h3>
<form method="post">
    <table>
        <tr><td>Modelo</td><td><input type="text" name="modelo" required></td></tr>
        <tr><td>Precio</td><td><input type="number" name="precio" min="100" max="1000" required></td></tr>
        <tr><td>Color</td>
            <td>
                <select name="color" required>
                    <option>Negro</option>
                    <option>Camel</option>
                </select>
            </td>
        </tr>
        <tr><td>Talla</td><td><input type="number" name="talla" min="1" max="15" step="1" required></td></tr>
        <tr><td colspan="2" align="center"><input type="submit" value="Guardar"> <input type="reset" value="Borrar"></td></tr>
    </table>
</form>

    <p>© 2026 - Práctica 1 | Desarrollo de Software Multiplataforma</p>
    <br><br>
    <a href="index.html">Regresar</a>
</center>
</body>
</html>
