<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Aspirantes</title>
</head>
<body>

<center>
    <h4>Registro de Aspirantes a la UT de la Costa</h4>

    <form action="" method="get">

        Nombre:
        <input type="text" name="nombre" required maxlength="50"><br><br>

        Edad:
        <input type="number" name="edad" required min="17"><br><br>

        Fecha de Nacimiento:
        <input type="date" name="fechanac" required><br><br>

        Bachillerato:
        <input type="text" name="escuela" required><br><br>

        Sexo:
        <input type="radio" name="sexo" value="hombre" required> Hombre
        <input type="radio" name="sexo" value="mujer"> Mujer<br><br>

        Correo Electrónico:
        <input type="email" name="correo" required maxlength="100"><br><br>

        Teléfono:
        <input type="tel" name="telefono" required
               pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
               placeholder="123-456-7890"
               maxlength="12"><br><br>

        Carrera:
        <select name="carrera" required>
            <option value="">Seleccione una opción</option>
            <option value="TI">Tecnologías de la Información</option>
            <option value="Agro">Agrobiotecnología</option>
            <option value="Admin">Administración</option>
            <option value="Merca">Mercadotecnia</option>
            <option value="PAL">Procesos Alimentarios</option>
        </select><br><br>

        Gustos:
        <select name="gustos[]" multiple required>
            <option value="leer">Leer</option>
            <option value="musica">Música</option>
            <option value="cine">Cine</option>
            <option value="juegos">Videojuegos</option>
        </select><br><br>

        Comentarios:
        <textarea name="comentarios" rows="5" cols="30"></textarea><br><br>

        Saludo:
        <button type="button"
                onclick="alert('¡Hola aspirante! ¿Cómo estás?')">
            Clickear
        </button><br><br>

        <input type="submit" value="Guardar">
        <input type="reset" value="Borrar">

    </form>
</center>

    <p style="font-family: Arial; color:#7B7D7D;">

    </p>

</center>



</body>
</html>
